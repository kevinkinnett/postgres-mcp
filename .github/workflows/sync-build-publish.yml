name: Sync upstream and publish image

on:
  workflow_dispatch:
  schedule:
    # every 3 hours
    - cron: "17 */3 * * *"

permissions:
  contents: write
  packages: write

env:
  UPSTREAM_REPO: https://github.com/crystaldba/postgres-mcp.git
  UPSTREAM_BRANCH: main
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/postgres-mcp

jobs:
  sync-build-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream and fetch
        run: |
          git remote add upstream "${UPSTREAM_REPO}" || true
          git fetch upstream "${UPSTREAM_BRANCH}" --tags

      - name: Detect change
        id: detect
        run: |
          LOCAL_SHA="$(git rev-parse HEAD)"
          UPSTREAM_SHA="$(git rev-parse upstream/${UPSTREAM_BRANCH})"

          echo "local_sha=$LOCAL_SHA" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fast-forward fork to upstream
        if: steps.detect.outputs.changed == 'true'
        run: |
          git checkout "${UPSTREAM_BRANCH}"
          git merge --ff-only "upstream/${UPSTREAM_BRANCH}"
          git push origin "${UPSTREAM_BRANCH}"

      - name: Log in to GHCR
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.detect.outputs.upstream_sha }}

      - name: Build and push image
        if: steps.detect.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
